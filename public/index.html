<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala do Dia — Hospital Costa dos Coqueiros</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    min-height: 100vh;
  }

  .header {
    background: #fff;
    border-bottom: 1px solid #e5e5e5;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .header h1 { font-size: 20px; font-weight: 600; }
  .header .subtitle { font-size: 14px; color: #666; }

  .header-actions { display: flex; gap: 8px; align-items: center; }

  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #fff;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s;
  }
  .btn:hover { background: #f0f0f0; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-primary { background: #1a56db; color: #fff; border-color: #1a56db; }
  .btn-primary:hover { background: #1648b3; }

  .container { max-width: 800px; margin: 24px auto; padding: 0 16px; }

  .loading { text-align: center; padding: 60px 20px; color: #666; font-size: 16px; }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #e5e5e5; border-top-color: #1a56db;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    text-align: center; padding: 40px;
    color: #dc2626; background: #fef2f2; border-radius: 12px;
  }

  .stats {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 12px; margin-bottom: 24px;
  }

  .stat-card {
    background: #fff; border-radius: 12px; padding: 16px;
    border: 1px solid #e5e5e5;
  }
  .stat-card .label {
    font-size: 12px; color: #888;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
  }
  .stat-card .value { font-size: 28px; font-weight: 600; }

  .setor {
    background: #fff; border-radius: 12px;
    border: 1px solid #e5e5e5; margin-bottom: 16px; overflow: hidden;
  }
  .setor-header {
    padding: 16px 20px; border-bottom: 1px solid #f0f0f0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .setor-header h2 { font-size: 16px; font-weight: 600; }
  .setor-count { font-size: 13px; color: #888; }

  .shift-group { padding: 12px 20px; border-bottom: 1px solid #f5f5f5; }
  .shift-group:last-child { border-bottom: none; }

  .shift-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 6px;
    font-size: 12px; font-weight: 600; margin-bottom: 8px;
  }
  .shift-SD { background: #dbeafe; color: #1e40af; }
  .shift-SN { background: #ede9fe; color: #5b21b6; }
  .shift-P  { background: #fef3c7; color: #92400e; }

  .prof-list { list-style: none; }
  .prof-list li {
    padding: 6px 0; font-size: 14px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid #fafafa;
  }
  .prof-list li:last-child { border-bottom: none; }
  .prof-name { font-weight: 500; }
  .prof-lotacao { color: #888; font-size: 13px; }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .header { padding: 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Escala do dia</h1>
    <div class="subtitle" id="dateDisplay">Carregando...</div>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="loadData()">Atualizar</button>
    <button class="btn btn-primary" onclick="exportPDF()" id="btnPDF" disabled>Exportar PDF</button>
  </div>
</div>

<div class="container">
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      Conectando ao SharePoint e lendo a escala...
    </div>
  </div>
</div>

<script>
let escalaData = null;

const SHIFT_LABELS = { SN: 'Servico noturno', P: 'Plantao 24h' };
const SHIFT_ORDER = ['SN', 'P'];

async function loadData() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div>Conectando ao SharePoint e lendo a escala...</div>';
  document.getElementById('btnPDF').disabled = true;

  try {
    const resp = await fetch('/api/escala');
    if (!resp.ok) throw new Error('Erro ao carregar dados');
    escalaData = await resp.json();
    if (escalaData.error) throw new Error(escalaData.error);
    render();
    document.getElementById('btnPDF').disabled = false;
  } catch (e) {
    content.innerHTML = '<div class="error"><strong>Erro:</strong> ' + e.message + '<br><br>Verifique as credenciais e tente novamente.</div>';
  }
}

function render() {
  const d = escalaData;
  document.getElementById('dateDisplay').textContent = 'Hospital Costa dos Coqueiros — ' + d.data_formatada;

  let totalSN = 0, totalP = 0, totalGeral = 0;
  for (const setor in d.setores) {
    for (const prof of d.setores[setor]) {
      totalGeral++;
      if (prof.plantao === 'SN') totalSN++;
      if (prof.plantao === 'P') totalP++;
    }
  }

  let html = '<div class="stats" style="grid-template-columns: repeat(3, 1fr);">' +
    '<div class="stat-card"><div class="label">Total</div><div class="value">' + totalGeral + '</div></div>' +
    '<div class="stat-card"><div class="label">SN</div><div class="value" style="color:#5b21b6">' + totalSN + '</div></div>' +
    '<div class="stat-card"><div class="label">P 24h</div><div class="value" style="color:#92400e">' + totalP + '</div></div>' +
    '</div>';

  for (const setor of ['TECNICOS', 'ENFERMEIRAS', 'CME']) {
    const profs = d.setores[setor] || [];
    if (profs.length === 0) continue;

    const byShift = {};
    for (const p of profs) {
      if (!byShift[p.plantao]) byShift[p.plantao] = [];
      byShift[p.plantao].push(p);
    }

    html += '<div class="setor"><div class="setor-header"><h2>' + setor + '</h2>' +
      '<span class="setor-count">' + profs.length + ' profissional(is)</span></div>';

    for (const shift of SHIFT_ORDER) {
      if (!byShift[shift]) continue;
      html += '<div class="shift-group"><div class="shift-badge shift-' + shift + '">' +
        shift + ' — ' + SHIFT_LABELS[shift] + '</div><ul class="prof-list">';
      for (const p of byShift[shift]) {
        const lot = p.lotacao ? ' <span class="prof-lotacao">(' + p.lotacao + ')</span>' : '';
        html += '<li><span class="prof-name">' + p.nome + '</span>' + lot + '</li>';
      }
      html += '</ul></div>';
    }
    html += '</div>';
  }

  document.getElementById('content').innerHTML = html;
}

function exportPDF() {
  if (!escalaData) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  const d = escalaData;
  const pageW = 210;
  const marginL = 15;
  const marginR = 15;
  let y = 20;

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(14);
  doc.text('HOSPITAL COSTA DOS COQUEIROS', pageW / 2, y, { align: 'center' });
  y += 7;

  doc.setFontSize(11);
  doc.text('ESCALA DO DIA — ' + d.data_formatada, pageW / 2, y, { align: 'center' });
  y += 10;

  doc.setDrawColor(200);
  doc.line(marginL, y, pageW - marginR, y);
  y += 8;

  for (const setor of ['TECNICOS', 'ENFERMEIRAS', 'CME']) {
    const profs = d.setores[setor] || [];
    if (profs.length === 0) continue;

    if (y > 260) { doc.addPage(); y = 20; }

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(12);
    doc.text(setor, marginL, y);
    y += 7;

    const byShift = {};
    for (const p of profs) {
      if (!byShift[p.plantao]) byShift[p.plantao] = [];
      byShift[p.plantao].push(p);
    }

    for (const shift of SHIFT_ORDER) {
      if (!byShift[shift]) continue;
      if (y > 260) { doc.addPage(); y = 20; }

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(10);
      doc.text(shift + ' — ' + SHIFT_LABELS[shift], marginL + 2, y);
      y += 6;

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.text('Nome', marginL + 2, y);
      doc.text('Assinatura', marginL + 110, y);
      y += 2;
      doc.setDrawColor(180);
      doc.line(marginL, y, pageW - marginR, y);
      y += 5;

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(10);

      for (const p of byShift[shift]) {
        if (y > 275) { doc.addPage(); y = 20; }
        doc.text(p.nome, marginL + 2, y);
        doc.setDrawColor(200);
        doc.line(marginL + 110, y, pageW - marginR, y);
        y += 7;
      }
      y += 4;
    }
    y += 4;
  }

  const totalPages = doc.internal.getNumberOfPages();
  for (let i = 1; i <= totalPages; i++) {
    doc.setPage(i);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(150);
    doc.text('Gerado em ' + new Date().toLocaleString('pt-BR') + ' — Pagina ' + i + '/' + totalPages, pageW / 2, 290, { align: 'center' });
    doc.setTextColor(0);
  }

  doc.save('escala_' + d.data.replace(/-/g, '') + '.pdf');
}

loadData();
</script>
</body>
</html>
