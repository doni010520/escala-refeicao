<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala do Dia — Hospital Costa dos Coqueiros</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    min-height: 100vh;
  }

  .header {
    background: #fff;
    border-bottom: 1px solid #e5e5e5;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .header h1 { font-size: 20px; font-weight: 600; }
  .header .subtitle { font-size: 14px; color: #666; }

  .header-actions { display: flex; gap: 8px; align-items: center; }

  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #fff;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s;
  }
  .btn:hover { background: #f0f0f0; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-primary { background: #1a56db; color: #fff; border-color: #1a56db; }
  .btn-primary:hover { background: #1648b3; }

  .container { max-width: 800px; margin: 24px auto; padding: 0 16px; }

  .loading { text-align: center; padding: 60px 20px; color: #666; font-size: 16px; }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #e5e5e5; border-top-color: #1a56db;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    text-align: center; padding: 40px;
    color: #dc2626; background: #fef2f2; border-radius: 12px;
  }

  .stats {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 12px; margin-bottom: 24px;
  }

  .stat-card {
    background: #fff; border-radius: 12px; padding: 16px;
    border: 1px solid #e5e5e5;
  }
  .stat-card .label {
    font-size: 12px; color: #888;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
  }
  .stat-card .value { font-size: 28px; font-weight: 600; }

  .setor {
    background: #fff; border-radius: 12px;
    border: 1px solid #e5e5e5; margin-bottom: 16px; overflow: hidden;
  }
  .setor-header {
    padding: 16px 20px; border-bottom: 1px solid #f0f0f0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .setor-header h2 { font-size: 16px; font-weight: 600; }
  .setor-count { font-size: 13px; color: #888; }

  .shift-group { padding: 12px 20px; border-bottom: 1px solid #f5f5f5; }
  .shift-group:last-child { border-bottom: none; }

  .shift-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 6px;
    font-size: 12px; font-weight: 600; margin-bottom: 8px;
  }
  .shift-SD { background: #dbeafe; color: #1e40af; }
  .shift-SN { background: #ede9fe; color: #5b21b6; }
  .shift-P  { background: #fef3c7; color: #92400e; }

  .prof-list { list-style: none; }
  .prof-list li {
    padding: 6px 0; font-size: 14px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid #fafafa;
  }
  .prof-list li:last-child { border-bottom: none; }
  .prof-name { font-weight: 500; }
  .prof-lotacao { color: #888; font-size: 13px; }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .header { padding: 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Escala do dia</h1>
    <div class="subtitle" id="dateDisplay">Carregando...</div>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="loadData()">Atualizar</button>
    <button class="btn btn-primary" onclick="exportPDF()" id="btnPDF" disabled>Exportar PDF</button>
  </div>
</div>

<div class="container">
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      Conectando ao SharePoint e lendo a escala...
    </div>
  </div>
</div>

<script>
let escalaData = null;
let logoBase64 = null;

const SHIFT_LABELS = { SN: 'Servico noturno', P: 'Plantao 24h' };
const SHIFT_ORDER = ['SN', 'P'];

(function loadLogo() {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    const c = document.createElement('canvas');
    c.width = img.naturalWidth;
    c.height = img.naturalHeight;
    c.getContext('2d').drawImage(img, 0, 0);
    logoBase64 = c.toDataURL('image/png');
  };
  img.src = 'logo-fesfsus.png';
})();

async function loadData() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div>Conectando ao SharePoint e lendo a escala...</div>';
  document.getElementById('btnPDF').disabled = true;

  try {
    const resp = await fetch('/api/escala');
    if (!resp.ok) throw new Error('Erro ao carregar dados');
    escalaData = await resp.json();
    if (escalaData.error) throw new Error(escalaData.error);
    render();
    document.getElementById('btnPDF').disabled = false;
  } catch (e) {
    content.innerHTML = '<div class="error"><strong>Erro:</strong> ' + e.message + '<br><br>Verifique as credenciais e tente novamente.</div>';
  }
}

function render() {
  const d = escalaData;
  document.getElementById('dateDisplay').textContent = 'Hospital Costa dos Coqueiros — ' + d.data_formatada;

  let totalSN = 0, totalP = 0, totalGeral = 0;
  for (const setor in d.setores) {
    for (const prof of d.setores[setor]) {
      totalGeral++;
      if (prof.plantao === 'SN') totalSN++;
      if (prof.plantao === 'P') totalP++;
    }
  }
  let html = '<div class="stats" style="grid-template-columns: repeat(3, 1fr);">' +
    '<div class="stat-card"><div class="label">Total</div><div class="value">' + totalGeral + '</div></div>' +
    '<div class="stat-card"><div class="label">SN</div><div class="value" style="color:#5b21b6">' + totalSN + '</div></div>' +
    '<div class="stat-card"><div class="label">P 24h</div><div class="value" style="color:#92400e">' + totalP + '</div></div>' +
    '</div>';

  for (const setor of ['TECNICOS', 'ENFERMEIRAS', 'CME']) {
    const profs = d.setores[setor] || [];
    if (profs.length === 0) continue;

    const byShift = {};
    for (const p of profs) {
      if (!byShift[p.plantao]) byShift[p.plantao] = [];
      byShift[p.plantao].push(p);
    }

    html += '<div class="setor"><div class="setor-header"><h2>' + setor + '</h2>' +
      '<span class="setor-count">' + profs.length + ' profissional(is)</span></div>';

    for (const shift of SHIFT_ORDER) {
      if (!byShift[shift]) continue;
      html += '<div class="shift-group"><div class="shift-badge shift-' + shift + '">' +
        shift + ' — ' + SHIFT_LABELS[shift] + '</div><ul class="prof-list">';
      for (const p of byShift[shift]) {
        const lot = p.lotacao ? ' <span class="prof-lotacao">(' + p.lotacao + ')</span>' : '';
        html += '<li><span class="prof-name">' + p.nome + '</span>' + lot + '</li>';
      }
      html += '</ul></div>';
    }
    html += '</div>';
  }

  document.getElementById('content').innerHTML = html;
}

function getAllProfs() {
  const all = [];
  for (const setor of ['TECNICOS', 'ENFERMEIRAS', 'CME']) {
    for (const p of (escalaData.setores[setor] || [])) {
      all.push(p);
    }
  }
  return all;
}

function getMealsForShift(shift) {
  if (shift === 'SN') return ['Ceia Leve', 'Desjejum'];
  if (shift === 'P') return ['Cafe da Manha', 'Almoco', 'Jantar', 'Ceia'];
  return [];
}

function drawMealPage(doc, mealName, profs, data_formatada) {
  const pageW = 297;
  const pageH = 210;
  const marginL = 15;
  const marginR = 15;
  const contentW = pageW - marginL - marginR;

  const colSeq = 18;
  const colNome = 110;
  const colSetor = 55;
  const colCusto = 40;
  const colAssign = contentW - colSeq - colNome - colSetor - colCusto;

  let y = 15;

  // Logo FESF-SUS
  if (logoBase64) {
    const logoH = 12;
    const logoW = logoH * (1580 / 460);
    doc.addImage(logoBase64, 'PNG', marginL, y - 6, logoW, logoH);
  } else {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.text('FESF-SUS', marginL, y);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.text('Fundacao Estatal Saude da Familia', marginL, y + 4);
  }

  // Data no canto direito
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.text('Data: ' + data_formatada, pageW - marginR, y, { align: 'right' });

  y += 12;

  // Título da refeição
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(12);
  doc.text('Lista de ' + mealName + ' - HECC', pageW / 2, y, { align: 'center' });
  y += 10;

  // Cabeçalho da tabela
  let x = marginL;
  doc.setFillColor(230, 230, 230);
  doc.rect(marginL, y - 4, contentW, 7, 'F');

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.text('Seq.', x + 2, y);
  x += colSeq;
  doc.text('Nome Completo', x + 2, y);
  x += colNome;
  doc.text('Setor', x + 2, y);
  x += colSetor;
  doc.text('Centro de Custo', x + 2, y);
  x += colCusto;
  doc.text('Assinatura', x + 2, y);
  y += 5;

  // Linhas da tabela
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  const rowH = 7;

  for (let i = 0; i < profs.length; i++) {
    if (y + rowH > pageH - 15) {
      doc.addPage('a4', 'landscape');
      y = 20;
    }

    const p = profs[i];
    x = marginL;

    // Linha horizontal
    doc.setDrawColor(200);
    doc.line(marginL, y + 3, marginL + contentW, y + 3);

    // Sequência
    doc.text(String(i + 1).padStart(2, '0'), x + 2, y);
    x += colSeq;

    // Nome
    doc.text(p.nome, x + 2, y);
    x += colNome;

    // Setor
    doc.text(p.lotacao || '', x + 2, y);
    x += colSetor;

    // Centro de custo
    doc.text('FESF', x + 2, y);
    x += colCusto;

    // Assinatura (vazio)
    y += rowH;
  }

  // Linhas extras vazias para preenchimento manual
  const extraRows = Math.max(5, 20 - profs.length);
  for (let i = 0; i < extraRows; i++) {
    if (y + rowH > pageH - 15) break;
    doc.setDrawColor(200);
    doc.line(marginL, y + 3, marginL + contentW, y + 3);
    doc.text(String(profs.length + i + 1).padStart(2, '0'), marginL + 2, y);
    y += rowH;
  }

  // Bordas verticais da tabela
  const tableTop = 38;
  const tableBottom = y + 3;
  doc.setDrawColor(180);
  x = marginL;
  doc.line(x, tableTop, x, tableBottom);
  x += colSeq;
  doc.line(x, tableTop, x, tableBottom);
  x += colNome;
  doc.line(x, tableTop, x, tableBottom);
  x += colSetor;
  doc.line(x, tableTop, x, tableBottom);
  x += colCusto;
  doc.line(x, tableTop, x, tableBottom);
  x += colAssign;
  doc.line(x, tableTop, x, tableBottom);

  // Borda superior e inferior
  doc.line(marginL, tableTop, marginL + contentW, tableTop);
  doc.line(marginL, tableBottom, marginL + contentW, tableBottom);
}

function exportPDF() {
  if (!escalaData) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

  const d = escalaData;
  const allProfs = getAllProfs();

  // Coletar todas as refeições necessárias
  const mealProfs = {};
  for (const p of allProfs) {
    const meals = getMealsForShift(p.plantao);
    for (const meal of meals) {
      if (!mealProfs[meal]) mealProfs[meal] = [];
      mealProfs[meal].push(p);
    }
  }


  const mealOrder = ['Cafe da Manha', 'Almoco', 'Jantar', 'Ceia', 'Ceia Leve', 'Desjejum'];
  let first = true;

  for (const meal of mealOrder) {
    if (!mealProfs[meal] || mealProfs[meal].length === 0) continue;
    if (!first) doc.addPage('a4', 'landscape');
    first = false;
    drawMealPage(doc, meal, mealProfs[meal], d.data_formatada);
  }

  doc.save('refeicoes_' + d.data.replace(/-/g, '') + '.pdf');
}

loadData();
</script>
</body>
</html>
